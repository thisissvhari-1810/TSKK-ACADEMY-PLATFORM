user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include            /etc/nginx/mime.types;
  default_type       application/octet-stream;
  server_tokens      off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log         /var/log/nginx/access.log main;
  error_log          /var/log/nginx/error.log warn;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  client_max_body_size 25m;
  client_body_timeout 60;
  send_timeout 60;

  # ── Compression ────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

  # ── Static asset cache (proxy) ─────────────────────────────────────────────
  proxy_cache_path /var/cache/nginx/next levels=1:2 keys_zone=next_cache:10m max_size=1g inactive=60m use_temp_path=off;

  include /etc/nginx/conf.d/*.conf;
}
