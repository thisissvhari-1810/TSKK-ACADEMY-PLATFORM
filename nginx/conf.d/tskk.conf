# ═══════════════════════════════════════════════════════════════════════════
# TSKK Academy Platform — Nginx virtual host
# Assumes a Let's Encrypt certificate at /etc/nginx/certs/{fullchain,privkey}.pem
# ═══════════════════════════════════════════════════════════════════════════

# ── Upstreams ────────────────────────────────────────────────────────────────
upstream tskk_backend {
  server backend:4000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream tskk_frontend {
  server frontend:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

# ── HTTP → HTTPS redirect + Let's Encrypt HTTP-01 challenge ────────────────
server {
  listen 80;
  listen [::]:80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS main server ──────────────────────────────────────────────────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1h;
  ssl_stapling on;
  ssl_stapling_verify on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com; connect-src 'self' https://*.razorpay.com https://api.razorpay.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://checkout.razorpay.com https://api.razorpay.com" always;

  limit_conn conn_zone 30;

  # ── API (NestJS) ──────────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_zone burst=40 nodelay;

    proxy_pass http://tskk_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
  }

  # Auth endpoints — stricter throttling
  location ~ ^/api/v[0-9]+/auth/(login|register|forgot-password|reset-password)$ {
    limit_req zone=auth_zone burst=10 nodelay;
    proxy_pass http://tskk_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  location /_next/static/ {
    proxy_cache next_cache;
    proxy_cache_valid 200 1y;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status;
    proxy_pass http://tskk_frontend;
  }

  location / {
    proxy_pass http://tskk_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 60s;
  }

  # Deny common junk requests
  location ~ /\.(?!well-known) { deny all; }
  location = /favicon.ico { access_log off; log_not_found off; proxy_pass http://tskk_frontend; }
  location = /robots.txt  { access_log off; log_not_found off; proxy_pass http://tskk_frontend; }
}
